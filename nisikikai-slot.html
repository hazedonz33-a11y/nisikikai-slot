<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>錦 櫂 ふりかけスロット</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#e8c84a;--red:#e83030;--bg:#f0ede8;
  --reach1:#ff4e50;--reach2:#ff8c42;--reach3:#ffe066;
}
html,body{
  min-height:100vh;background:var(--bg);
  font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,sans-serif;
  display:flex;flex-direction:column;align-items:center;
  padding:env(safe-area-inset-top,12px) env(safe-area-inset-right,0) env(safe-area-inset-bottom,12px);
  overflow-x:hidden;
}
canvas#confetti{position:fixed;inset:0;pointer-events:none;z-index:100;width:100%;height:100%}
#flash{position:fixed;inset:0;pointer-events:none;z-index:59;opacity:0;transition:opacity .14s}
#flash.flash-on{animation:screenFlash .14s ease-out forwards}
@keyframes screenFlash{0%{opacity:.7}100%{opacity:0}}

/* REACH overlay */
#reach-overlay{
  position:fixed;inset:0;z-index:60;display:flex;flex-direction:column;
  align-items:center;justify-content:center;pointer-events:none;
  opacity:0;transition:opacity .2s;
}
#reach-overlay.show{opacity:1}
#reach-bg{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at center,rgba(255,80,40,.55) 0%,rgba(0,0,0,.65) 100%);
}
#reach-text{
  position:relative;font-size:clamp(52px,14vw,88px);font-weight:900;
  color:#fff;text-shadow:0 0 30px #ff4e50,0 0 60px #ff8c42;
  letter-spacing:.05em;
  animation:none;
}
#reach-overlay.show #reach-text{
  animation:reachBounce .5s cubic-bezier(.36,.07,.19,.97) forwards,
             reachColor 0.6s linear infinite alternate;
}
#reach-sub{
  position:relative;font-size:clamp(20px,5vw,32px);font-weight:700;
  color:#ffe066;margin-top:8px;text-shadow:0 0 16px #ff8c42;
}
@keyframes reachBounce{
  0%{transform:scale(.3) rotate(-5deg)}
  60%{transform:scale(1.15) rotate(2deg)}
  80%{transform:scale(.95) rotate(-1deg)}
  100%{transform:scale(1) rotate(0)}
}
@keyframes reachColor{
  0%{color:#fff;text-shadow:0 0 30px #ff4e50,0 0 60px #ff8c42}
  100%{color:#ffe066;text-shadow:0 0 30px #ff8c42,0 0 60px #ffe066}
}

/* REACH zoom panel */
#reach-zoom{
  position:fixed;inset:0;z-index:65;display:flex;flex-direction:column;
  align-items:center;justify-content:center;pointer-events:none;opacity:0;
}
#reach-zoom.show{opacity:1}
#reach-zoom-bg{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at center,rgba(20,10,40,.7) 0%,rgba(0,0,0,.75) 100%);
}
#reach-zoom-box{
  position:relative;
  width:clamp(180px,55vw,260px);height:clamp(180px,55vw,260px);
  border-radius:28px;
  opacity:0;transform:scale(.3) rotate(-8deg);
}
#reach-zoom.show #reach-zoom-box{
  animation:zoomBoxEnter .55s cubic-bezier(.34,1.5,.64,1) forwards,
             zoomBoxGlow .22s ease-in-out .55s infinite alternate;
}
#reach-zoom-box::before{
  content:'';position:absolute;inset:-7px;border-radius:35px;
  background:conic-gradient(#ff4e50,#ff8c42,#ffe066,#a8ff78,#43cfff,#ff4e50);
  animation:spinBorder .6s linear infinite;z-index:0;
}
#reach-zoom-box::after{
  content:'';position:absolute;inset:0;border-radius:26px;
  background:#fff;z-index:1;
}
#reach-zoom-reel{
  position:relative;z-index:2;
  width:100%;height:100%;border-radius:26px;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
#reach-zoom-img{
  width:90%;height:90%;object-fit:contain;
}
#reach-zoom-label{
  position:relative;margin-top:18px;
  font-size:clamp(18px,5vw,28px);font-weight:800;
  color:#ffe066;text-shadow:0 0 20px #ff8c42;
}
@keyframes zoomBoxEnter{
  0%{opacity:0;transform:scale(.3) rotate(-8deg)}
  100%{opacity:1;transform:scale(1) rotate(0deg)}
}
@keyframes zoomBoxGlow{
  0%{filter:drop-shadow(0 0 8px #ff8c42)}
  100%{filter:drop-shadow(0 0 24px #ff4e50)}
}
@keyframes spinBorder{to{transform:rotate(360deg)}}

/* WIN overlay */
#win-overlay{
  position:fixed;inset:0;z-index:70;display:flex;flex-direction:column;
  align-items:center;justify-content:center;pointer-events:none;
  opacity:0;transition:opacity .25s;
}
#win-overlay.show{opacity:1;pointer-events:auto}
#win-bg{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at center,rgba(20,10,0,.72) 0%,rgba(0,0,0,.8) 100%);
}
#win-title{
  position:relative;font-size:clamp(48px,13vw,80px);font-weight:900;
  color:#ffe066;text-shadow:0 0 30px #e8c84a;
  animation:none;
}
#win-overlay.show #win-title{
  animation:winTitleBounce .55s cubic-bezier(.34,1.5,.64,1) forwards,
             winTitleColor .5s linear .55s infinite alternate;
}
#win-overlay.jackpot #win-title{color:#fff}
@keyframes winTitleBounce{
  0%{opacity:0;transform:scale(.15)}
  100%{opacity:1;transform:scale(1)}
}
@keyframes winTitleColor{
  0%{color:#ffe066;text-shadow:0 0 30px #e8c84a}
  100%{color:#ff8c42;text-shadow:0 0 40px #ff4e50}
}
#win-product{
  position:relative;font-size:clamp(16px,4.5vw,24px);font-weight:700;
  color:#fff;margin-top:10px;text-align:center;
}
#win-prize{
  position:relative;font-size:clamp(22px,6vw,36px);font-weight:900;
  color:#a8ff78;margin-top:8px;text-shadow:0 0 20px #43cfff;
}
#win-overlay.jackpot{background:none}
#win-overlay.jackpot #win-bg{
  background:radial-gradient(ellipse at center,rgba(60,10,120,.8) 0%,rgba(0,0,0,.85) 100%);
}
#win-overlay.jackpot #win-prize{color:#ffe066;text-shadow:0 0 30px #ff8c42}

/* Stars */
.reach-star{
  position:fixed;pointer-events:none;z-index:90;font-size:22px;
  animation:starFloat 1.2s ease-out forwards;
}
@keyframes starFloat{
  0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}
  100%{opacity:0;transform:translateY(-160px) rotate(180deg) scale(.3)}
}
/* Coins */
.coin{
  position:fixed;top:-30px;pointer-events:none;z-index:101;font-size:26px;
  animation:coinFall var(--dur) ease-in forwards;
}
@keyframes coinFall{
  0%{transform:translateY(0) rotate(0deg)}
  100%{transform:translateY(var(--dy)) rotate(420deg);opacity:0}
}

/* Main layout */
h1{
  font-size:clamp(18px,5vw,26px);font-weight:900;
  color:#333;margin:clamp(12px,3vw,20px) 0 4px;
  letter-spacing:.08em;text-align:center;
}
.subtitle{
  font-size:clamp(11px,3vw,14px);color:#888;
  margin-bottom:clamp(8px,2vw,14px);
}
.machine{
  width:min(520px,calc(100vw - 32px));
  background:#fff;border-radius:28px;
  box-shadow:0 0 0 3px var(--gold),0 0 0 6px #fff,0 16px 48px rgba(0,0,0,.12);
  padding:clamp(12px,3vw,20px);
  transition:box-shadow .3s;
}
.machine.reach-active{
  animation:reachActivePulse .8s ease-in-out infinite alternate;
}
@keyframes reachActivePulse{
  0%{box-shadow:0 0 0 3px #ff8c42,0 0 0 6px #fff,0 16px 48px rgba(255,100,40,.3)}
  100%{box-shadow:0 0 0 4px #ff4e50,0 0 0 8px #fff,0 16px 64px rgba(255,60,20,.5)}
}
.machine.win-active{
  animation:winPulse .45s ease-in-out infinite alternate;
}
@keyframes winPulse{
  0%{box-shadow:0 0 0 3px #e8c84a,0 0 0 6px #fff,0 16px 48px rgba(232,200,74,.4)}
  100%{box-shadow:0 0 0 5px #ffe066,0 0 0 10px #fff,0 16px 64px rgba(255,224,102,.6)}
}
.machine.jackpot-active{
  animation:machineShake .15s ease-in-out infinite,rainbowBorder 0.4s linear infinite;
}
@keyframes machineShake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-4px)}
  75%{transform:translateX(4px)}
}
@keyframes rainbowBorder{
  0%{box-shadow:0 0 0 4px #ff4e50,0 0 0 8px #fff,0 16px 48px rgba(255,78,80,.4)}
  25%{box-shadow:0 0 0 4px #ff8c42,0 0 0 8px #fff,0 16px 48px rgba(255,140,66,.4)}
  50%{box-shadow:0 0 0 4px #ffe066,0 0 0 8px #fff,0 16px 48px rgba(255,224,102,.4)}
  75%{box-shadow:0 0 0 4px #a8ff78,0 0 0 8px #fff,0 16px 48px rgba(168,255,120,.4)}
  100%{box-shadow:0 0 0 4px #43cfff,0 0 0 8px #fff,0 16px 48px rgba(67,207,255,.4)}
}
.machine-header{
  text-align:center;font-size:clamp(13px,3.5vw,17px);font-weight:800;
  color:var(--gold);letter-spacing:.15em;margin-bottom:12px;
}
.reels{
  display:flex;gap:clamp(6px,2vw,12px);justify-content:center;margin-bottom:10px;
}
.reel-col{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  flex:1;max-width:clamp(90px,28vw,150px);
}
.reel-wrapper{
  width:100%;aspect-ratio:1;
  border-radius:16px;overflow:hidden;
  border:2px solid #e8e0d0;
  position:relative;
  background:#fafaf8;
}
.reel-wrapper::after{
  content:'';position:absolute;inset:0;border-radius:14px;
  box-shadow:inset 0 2px 6px rgba(0,0,0,.08);pointer-events:none;z-index:1;
}
.reel-wrapper.reach-last{
  animation:spinBorder .7s linear infinite,reachLastGlow .5s ease-in-out infinite alternate;
}
.reel-wrapper.reach-last::before{
  content:'';position:absolute;inset:-4px;border-radius:20px;
  background:conic-gradient(#ff4e50,#ff8c42,#ffe066,#a8ff78,#43cfff,#ff4e50);
  animation:spinBorder .7s linear infinite;
  z-index:-1;
}
@keyframes reachLastGlow{
  0%{filter:drop-shadow(0 0 6px #ff8c42)}
  100%{filter:drop-shadow(0 0 18px #ff4e50)}
}
.reel-wrapper.winner{
  animation:winGlow .55s ease-in-out infinite alternate;
  border-color:var(--gold);
}
@keyframes winGlow{
  0%{box-shadow:0 0 8px #e8c84a,inset 0 0 8px rgba(232,200,74,.2)}
  100%{box-shadow:0 0 24px #ffe066,inset 0 0 16px rgba(255,224,102,.3)}
}
.reel{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:2;
}
.reel img{
  width:88%;height:88%;object-fit:contain;
  transition:transform .1s;
}
.reel.spinning img{
  animation:reelSpin .16s ease-in-out infinite;
}
@keyframes reelSpin{
  0%{transform:scaleY(1);filter:blur(0)}
  50%{transform:scaleY(.6);filter:blur(2px)}
  100%{transform:scaleY(1);filter:blur(0)}
}
.reel.stopping img{
  animation:stopBounce .4s cubic-bezier(.36,.07,.19,.97) forwards;
}
@keyframes stopBounce{
  0%{transform:scaleY(.6) translateY(-4px)}
  40%{transform:scaleY(1.12) translateY(2px)}
  70%{transform:scaleY(.95) translateY(-1px)}
  100%{transform:scaleY(1) translateY(0)}
}
.reel.reach-spin img{
  animation:reachSpinSlow .55s ease-in-out infinite;
}
@keyframes reachSpinSlow{
  0%{transform:scaleY(1);filter:blur(0)}
  50%{transform:scaleY(.7);filter:blur(1.5px)}
  100%{transform:scaleY(1);filter:blur(0)}
}

/* STOP button */
.stop-btn{
  width:100%;padding:clamp(8px,2.5vw,12px) 4px;
  border-radius:10px;border:none;cursor:pointer;
  font-size:clamp(12px,3.5vw,15px);font-weight:800;
  letter-spacing:.08em;background:#ccc;color:#888;
  transition:all .15s;
}
.stop-btn.active{
  background:linear-gradient(135deg,#ff6060,#e83030);
  color:#fff;box-shadow:0 4px 12px rgba(232,48,48,.4);
  animation:stopBtnPulse .6s ease-in-out infinite alternate;
}
@keyframes stopBtnPulse{
  0%{box-shadow:0 4px 12px rgba(232,48,48,.4)}
  100%{box-shadow:0 6px 20px rgba(232,48,48,.7)}
}
.stop-btn:disabled{cursor:default}

/* Hint */
.reel-hint{
  text-align:center;font-size:clamp(11px,3vw,14px);
  color:#aaa;min-height:20px;margin-bottom:8px;
  transition:color .2s;
}
.reel-hint.active-hint{color:#e83030;font-weight:700}

/* Controls */
.controls{padding-top:8px}
.credits-row{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:8px;
}
.credits-box,.won-box{
  background:#faf7f0;border:1.5px solid var(--gold);
  border-radius:10px;padding:6px 12px;min-width:100px;text-align:center;
}
.credits-label,.won-label{font-size:11px;color:#aaa;margin-bottom:2px}
.credits-val{font-size:clamp(20px,5vw,26px);font-weight:900;color:#333}
.won-val{font-size:clamp(20px,5vw,26px);font-weight:900;color:#e8a030}
.message{
  text-align:center;min-height:24px;font-size:clamp(13px,3.5vw,16px);
  font-weight:700;color:#555;margin-bottom:10px;
  transition:color .2s;
}
.message.lose-msg{color:#e83030}
.message.reach-msg{color:#ff4e50;font-weight:900}
.message.zoom-msg{color:#ffe066;font-weight:900}
.spin-btn{
  width:100%;padding:clamp(14px,4vw,18px);
  border-radius:14px;border:none;cursor:pointer;
  font-size:clamp(18px,5vw,24px);font-weight:900;
  letter-spacing:.12em;
  background:linear-gradient(135deg,#f0d050,#e8a030);
  color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.25);
  box-shadow:0 6px 20px rgba(232,160,48,.4);
  transition:all .15s;
}
.spin-btn:active{transform:scale(.97)}
.spin-btn:disabled{
  background:linear-gradient(135deg,#d0c8a8,#b8b090);
  box-shadow:none;cursor:default;
}
/* bottom padding */
.bottom-pad{height:env(safe-area-inset-bottom,0)}
</style>
</head>
<body>
<canvas id="confetti"></canvas>
<div id="flash"></div>
<div id="reach-overlay">
  <div id="reach-bg"></div>
  <div id="reach-text">REACH!!</div>
  <div id="reach-sub">揃うか！？</div>
</div>
<div id="reach-zoom">
  <div id="reach-zoom-bg"></div>
  <div id="reach-zoom-box">
    <div id="reach-zoom-reel">
      <img id="reach-zoom-img" alt="zoom">
    </div>
  </div>
  <div id="reach-zoom-label">どうなる！？</div>
</div>
<div id="win-overlay">
  <div id="win-bg"></div>
  <div id="win-title"></div>
  <div id="win-product"></div>
  <div id="win-prize"></div>
</div>

<h1>🎰 錦 櫂 ふりかけスロット</h1>
<p class="subtitle">全リール揃ったら当たり！</p>
<div class="machine" id="machine">
  <div class="machine-header">🎰 NISIKI-KAI SLOT 🎰</div>
  <div class="reels" id="reels"></div>
  <p class="reel-hint" id="hint">SPINを押してスタート</p>
  <div class="controls">
    <div class="credits-row">
      <div class="credits-box">
        <div class="credits-label">🪙 コイン</div>
        <div class="credits-val" id="creditsVal">10</div>
      </div>
      <div class="won-box">
        <div class="won-label">🏆 獲得</div>
        <div class="won-val" id="wonVal">0</div>
      </div>
    </div>
    <div class="message" id="message">スピンしてください！</div>
    <button class="spin-btn" id="spinBtn">SPIN ▶</button>
  </div>
</div>
<div class="bottom-pad"></div>

let gameState='idle', reelState=['idle','idle','idle'];
let stoppedOrder=[], spinIntervals=[null,null,null];
let currentIdx=[0,0,0], finalIdx=[0,0,0];
let credits=10, won=0;

function rand(){return Math.floor(Math.random()*PRODUCTS.length)}

// Build reels DOM
const reelsEl=document.getElementById('reels');
for(let i=0;i<3;i++){
  const col=document.createElement('div');col.className='reel-col';
  const wrapper=document.createElement('div');
  wrapper.className='reel-wrapper';wrapper.id='w'+i;
  const reel=document.createElement('div');
  reel.className='reel';reel.id='r'+i;
  const img=document.createElement('img');img.id='img'+i;img.alt='';
  reel.appendChild(img);wrapper.appendChild(reel);col.appendChild(wrapper);

  btn.className='stop-btn';btn.id='sb'+i;btn.textContent='STOP '+['①','②','③'][i];
  btn.disabled=true;
  btn.addEventListener('click',()=>userStop(i));
  col.appendChild(btn);
  reelsEl.appendChild(col);
}

function showImage(i,idx){
  const img=document.getElementById('img'+i);
  img.src=PRODUCTS[idx].img;
  currentIdx[i]=idx;
}

// Init
for(let i=0;i<3;i++){currentIdx[i]=rand();showImage(i,currentIdx[i]);}
updateCredits();

function updateCredits(){
  document.getElementById('creditsVal').textContent=credits;
  document.getElementById('wonVal').textContent=won;
}

const spinBtn=document.getElementById('spinBtn');
const hint=document.getElementById('hint');
const message=document.getElementById('message');

spinBtn.addEventListener('click',startSpin);

function startSpin(){
  if(gameState!=='idle')return;
  if(credits<=0)return;
  credits--;won=0;updateCredits();
  gameState='spinning';
  stoppedOrder=[];
  vib(25);

  }

  // Start spinning
  for(let i=0;i<3;i++){
    reelState[i]='spinning';
    const r=document.getElementById('r'+i);
    r.className='reel spinning';
    spinIntervals[i]=setInterval(()=>{
      currentIdx[i]=(currentIdx[i]+1)%PRODUCTS.length;
      showImage(i,currentIdx[i]);
    },130);
    const btn=document.getElementById('sb'+i);
    btn.disabled=false;btn.className='stop-btn active';
  }
  spinBtn.disabled=true;
  hint.textContent='▼ 下のボタンで停止 ▼';
  hint.className='reel-hint active-hint';
  message.textContent='STOPボタンで止めてください！';
  message.className='message';
}

function userStop(i){
  if(reelState[i]!=='spinning')return;
  const remaining=reelState.filter(s=>s==='spinning').length;
  const stopped=stoppedOrder.map(idx=>finalIdx[idx]);
  // Check REACH: last reel AND first 2 match
  if(remaining===1&&stoppedOrder.length===2&&finalIdx[stoppedOrder[0]]===finalIdx[stoppedOrder[1]]){
    triggerChanceGimmick(i);
  } else {
    stopReelNormal(i);
  }
}

function stopReelNormal(i){
  clearInterval(spinIntervals[i]);spinIntervals[i]=null;
  reelState[i]='stopped';
  stoppedOrder.push(i);
  showImage(i,finalIdx[i]);
  const r=document.getElementById('r'+i);
  r.className='reel stopping';
  setTimeout(()=>r.className='reel',400);
  const btn=document.getElementById('sb'+i);
  btn.disabled=true;btn.className='stop-btn';
  vib(35);

  // Check 2 stopped and match
  if(stoppedOrder.length===2&&finalIdx[stoppedOrder[0]]===finalIdx[stoppedOrder[1]]){
    hint.textContent='2つ揃った！最後を止めて！';
    message.textContent='あと1つ！チャンスかも…';
  }

  if(stoppedOrder.length===3){
    setTimeout(checkResult,420);
  }
}

function triggerChanceGimmick(ri){
  reachReelIdx=ri;
  gameState='gimmick';
  // Disable all stop buttons
  for(let i=0;i<3;i++){
    const btn=document.getElementById('sb'+i);
    btn.disabled=true;btn.className='stop-btn';
  }
  clearInterval(spinIntervals[ri]);spinIntervals[ri]=null;
  // Last reel gets reach styling
  document.getElementById('w'+ri).classList.add('reach-last');
  document.getElementById('machine').classList.add('reach-active');
  hint.textContent='';
  message.textContent='🔥🔥 REACH！！ 揃うか！？ 🔥🔥';
  message.className='message reach-msg';
  // Slow spin
  slowInterval=setInterval(()=>{
    currentIdx[ri]=(currentIdx[ri]+1)%PRODUCTS.length;
    showImage(ri,currentIdx[ri]);
    document.getElementById('reach-zoom-img').src=PRODUCTS[currentIdx[ri]].img;
  },250);
  document.getElementById('r'+ri).className='reel reach-spin';

  setTimeout(showReach,150);
}

function showReach(){
  const overlay=document.getElementById('reach-overlay');
  overlay.classList.add('show');
  vib([80,40,80,40,120,60,80,40,80]);
  // Flashes
  [0,200,400,650,950,1300].forEach(t=>setTimeout(()=>triggerFlash('#ff8c42'),t));
  setTimeout(()=>{hideReach();showZoom();},1550);
}
function hideReach(){
  document.getElementById('reach-overlay').classList.remove('show');
}
function showZoom(){
  const zoom=document.getElementById('reach-zoom');
  zoom.classList.add('show');
  document.getElementById('reach-zoom-img').src=PRODUCTS[currentIdx[reachReelIdx]].img;
  vib([60,30,120,30,60]);
  triggerFlash('#ffe066');
  setTimeout(()=>triggerFlash('#fff'),200);
  message.textContent='👀 どうなる！？';
  message.className='message zoom-msg';

  // Star bursts
  [2200,3100,4100,5200,6200].forEach(t=>setTimeout(burstFromZoomBox,t-(1700)));
  // Flashes
  [2500,4000,5500].forEach(t=>setTimeout(()=>triggerFlash('#ffe066'),t-1700));

  // Resolve at 7000ms total (5300 after zoom show)
  setTimeout(resolveReach,5300);
}
function hideZoom(){
  document.getElementById('reach-zoom').classList.remove('show');
}

function burstFromZoomBox(){
  const box=document.getElementById('reach-zoom-box');
  const rect=box.getBoundingClientRect();
  for(let k=0;k<6;k++){
    setTimeout(()=>spawnStar(
      rect.left+rect.width*Math.random(),
      rect.top+rect.height*Math.random()
    ),k*110);
  }
}

function resolveReach(){
  clearInterval(slowInterval);slowInterval=null;
  hideZoom();
  const ri=reachReelIdx;
  document.getElementById('w'+ri).classList.remove('reach-last');
  document.getElementById('r'+ri).classList.remove('reach-spin');
  document.getElementById('machine').classList.remove('reach-active');
  showImage(ri,finalIdx[ri]);
  triggerFlash('#fff');
  const r=document.getElementById('r'+ri);
  r.className='reel stopping';
  setTimeout(()=>r.className='reel',400);
  stoppedOrder.push(ri);
  setTimeout(checkResult,460);
}

function checkResult(){
  const isWin=finalIdx[0]===finalIdx[1]&&finalIdx[1]===finalIdx[2];
  const isJackpot=isWin&&finalIdx[0]===PRODUCTS.length-1;
  if(isWin){
    triggerWinSequence(isJackpot);
  } else {
    // Lose
    vib(20);
    hint.textContent='SPINを押してスタート';
    hint.className='reel-hint';
    message.textContent='惜しい！もう一度チャレンジ！';
    message.className='message lose-msg';
    gameState='idle';
    spinBtn.disabled=false;
    if(credits<=0){
      setTimeout(()=>{
        credits=10;won=0;updateCredits();
        message.textContent='コインをリセットしました！';
        message.className='message';
      },2500);
    }
  }
}

function triggerWinSequence(isJackpot){
  const prize=isJackpot?30:10;
  const prodName=PRODUCTS[finalIdx[0]].name;
  credits+=prize;won+=prize;updateCredits();

  // Win glow on reels
  for(let i=0;i<3;i++)document.getElementById('w'+i).classList.add('winner');
  const machine=document.getElementById('machine');
  machine.classList.add('win-active');
  if(isJackpot)machine.classList.add('jackpot-active');

  // Flash sequence
  if(isJackpot){
    const cols=['#ff4e50','#fff','#ff8c42','#fff','#ffe066','#fff','#a8ff78','#fff','#43cfff','#fff','#ff4e50','#fff'];
    cols.forEach((c,i)=>setTimeout(()=>triggerFlash(c),i*220));
    vib([100,40,100,40,200,60,100,40,100,40,200,60,200]);
  } else {
    const cols=['#ffe066','#fff','#e8c84a','#fff','#ffe066','#fff'];
    cols.forEach((c,i)=>setTimeout(()=>triggerFlash(c),i*300+130));
    vib([80,40,80,40,120,60,80,40,200]);
  }

  // Win overlay
  const winOverlay=document.getElementById('win-overlay');
  const winTitle=document.getElementById('win-title');
  const winProduct=document.getElementById('win-product');
  const winPrize=document.getElementById('win-prize');
  winTitle.textContent=isJackpot?'JACKPOT!!':'当たり！！';
  winProduct.textContent=prodName+' × 3';
  winPrize.textContent='+'+prize+'コイン';
  if(isJackpot)winOverlay.classList.add('jackpot');
  setTimeout(()=>winOverlay.classList.add('show'),130);

  // Stars
  const starTimes=isJackpot?[200,500,900,1300,1800,2400,3100,3700]:[200,600,1200,1900];
  starTimes.forEach(t=>setTimeout(()=>{
    for(let i=0;i<3;i++)spawnStar(Math.random()*window.innerWidth,Math.random()*window.innerHeight*.6);
  },t));

  // Coins
  spawnCoins(isJackpot?22:10);
  if(isJackpot){
    setTimeout(()=>spawnCoins(18),900);
    setTimeout(()=>spawnCoins(14),2000);
  }

  // Confetti
  launchConfetti(isJackpot?280:110);
  if(isJackpot){
    setTimeout(()=>launchConfetti(180),1600);
    setTimeout(()=>launchConfetti(120),3000);
  }

  // Cleanup
  const endTime=isJackpot?5000:3200;
  setTimeout(()=>{
    winOverlay.classList.remove('show','jackpot');
    for(let i=0;i<3;i++)document.getElementById('w'+i).classList.remove('winner');
    machine.classList.remove('win-active','jackpot-active');
    hint.textContent='SPINを押してスタート';
    hint.className='reel-hint';
    message.textContent=isJackpot?
      '🎊 JACKPOT！ ギフトセット当選！ +30コイン':
      '🎉 当たり！ '+prodName+' ×3！ +'+prize+'コイン';
    message.className='message';
    gameState='idle';
    spinBtn.disabled=false;
    if(credits<=0){
      setTimeout(()=>{credits=10;won=0;updateCredits();},2500);
    }
  },endTime);
}

function triggerFlash(color){
  const el=document.getElementById('flash');
  el.style.background=color;
  el.classList.remove('flash-on');
  void el.offsetWidth;
  el.classList.add('flash-on');
  setTimeout(()=>el.classList.remove('flash-on'),140);
}

function spawnStar(x,y){
  const el=document.createElement('div');
  el.className='reach-star';
  el.textContent=['⭐','✨','🌟','💫'][Math.floor(Math.random()*4)];
  el.style.left=x+'px';el.style.top=y+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1200);
}

function spawnCoins(n){
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='coin';el.textContent='🪙';
      const x=8+Math.random()*84;
      const dur=(1.2+Math.random()*1.3).toFixed(2)+'s';
      const dy=(window.innerHeight*.55+Math.random()*window.innerHeight*.45).toFixed(0)+'px';
      el.style.left=x+'vw';
      el.style.setProperty('--dur',dur);
      el.style.setProperty('--dy',dy);
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),2600);
    },i*60);
  }
}

// Confetti
const confCanvas=document.getElementById('confetti');
const confCtx=confCanvas.getContext('2d');
let confParticles=[];
function resizeConf(){confCanvas.width=window.innerWidth;confCanvas.height=window.innerHeight;}
resizeConf();window.addEventListener('resize',resizeConf);
const CONF_COLORS=['#e8c84a','#ff8c42','#ff4e50','#43cfff','#a8ff78','#ffffff'];
let confRaf=null;
function launchConfetti(n){
  resizeConf();
  for(let i=0;i<n;i++){
    confParticles.push({
      x:Math.random()*confCanvas.width,y:-10,
      vx:(Math.random()-.5)*4,vy:Math.random()*2+1,
      r:4+Math.random()*6,
      color:CONF_COLORS[Math.floor(Math.random()*CONF_COLORS.length)],
      rot:Math.random()*360,spin:(Math.random()-.5)*8,
      life:1
    });
  }
  if(!confRaf)animConf();
}
function animConf(){
  confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);
  confParticles=confParticles.filter(p=>{
    p.vy+=0.08;p.x+=p.vx;p.y+=p.vy;p.rot+=p.spin;
    if(p.y>confCanvas.height+20)return false;
    confCtx.save();
    confCtx.translate(p.x,p.y);confCtx.rotate(p.rot*Math.PI/180);
    confCtx.fillStyle=p.color;confCtx.globalAlpha=Math.min(1,p.life);
    confCtx.fillRect(-p.r/2,-p.r/2,p.r,p.r*.6);
    confCtx.restore();
    return true;
  });
  if(confParticles.length>0){confRaf=requestAnimationFrame(animConf);}
  else{confRaf=null;confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);}
}

function vib(pattern){
  if(navigator.vibrate)navigator.vibrate(pattern);
}
</script>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffffff">
  <title>錦　櫂 ふりかけスロット</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overscroll-behavior: none; }

    body {
      min-height: 100vh; min-height: 100dvh;
      background: #f0ede8;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      color: #1a1a1a;
      padding:
        calc(16px + env(safe-area-inset-top))
        calc(16px + env(safe-area-inset-right))
        calc(16px + env(safe-area-inset-bottom))
        calc(16px + env(safe-area-inset-left));
    }

    h1 {
      font-size: clamp(1.4rem, 6vw, 2.2rem);
      font-weight: 900; letter-spacing: 0.1em;
      text-align: center; color: #1a1a1a; margin-bottom: 4px;
    }
    .subtitle {
      font-size: clamp(0.72rem, 3vw, 0.85rem);
      color: #999; text-align: center;
      margin-bottom: clamp(14px, 4vw, 26px);
    }

    /* ── Machine ── */
    .machine {
      width: min(520px, calc(100vw - 32px));
      background: #fff; border-radius: 28px;
      padding: clamp(14px,4vw,26px) clamp(12px,4vw,22px) clamp(16px,5vw,26px);
      box-shadow: 0 0 0 3px #e8c84a, 0 0 0 6px #fff, 0 16px 48px rgba(0,0,0,0.12);
      transition: box-shadow 0.3s;
    }
    /* リーチ中: マシンは控えめな呼吸グロー（シェイクなし） */
    .machine.reach-active {
      animation: reachMachinePulse 0.8s ease-in-out infinite alternate;
    }
    @keyframes reachMachinePulse {
      from { box-shadow: 0 0 0 3px #e8c84a, 0 0 0 6px #fff, 0 16px 48px rgba(0,0,0,0.12); }
      to   { box-shadow: 0 0 0 4px #ff8c42, 0 0 40px rgba(255,140,66,0.35), 0 16px 60px rgba(255,78,80,0.12); }
    }
    /* 当たり/JACKPOT用 (既存維持) */
    @keyframes machineShake {
      0%,100% { transform: translateX(0) rotate(0deg); }
      15%     { transform: translateX(-7px) rotate(-0.6deg); }
      30%     { transform: translateX(7px)  rotate(0.6deg);  }
      50%     { transform: translateX(-5px) rotate(-0.3deg); }
      70%     { transform: translateX(6px)  rotate(0.5deg);  }
      85%     { transform: translateX(-4px); }
    }
    @keyframes rainbowBorder {
      0%   { box-shadow: 0 0 0 4px #ff4e50, 0 0 40px rgba(255,78,80,0.5),  0 16px 60px rgba(255,78,80,0.2); }
      25%  { box-shadow: 0 0 0 4px #ff8c42, 0 0 40px rgba(255,140,66,0.5), 0 16px 60px rgba(255,140,66,0.2); }
      50%  { box-shadow: 0 0 0 4px #ffe066, 0 0 40px rgba(255,224,102,0.5),0 16px 60px rgba(255,224,102,0.2); }
      75%  { box-shadow: 0 0 0 4px #43cfff, 0 0 40px rgba(67,207,255,0.5), 0 16px 60px rgba(67,207,255,0.2); }
      100% { box-shadow: 0 0 0 4px #ff4e50, 0 0 40px rgba(255,78,80,0.5),  0 16px 60px rgba(255,78,80,0.2); }
    }

    .machine-header {
      text-align: center;
      font-size: clamp(0.62rem, 2.6vw, 0.76rem);
      letter-spacing: 0.18em; color: #c8a830; font-weight: 700;
      margin-bottom: clamp(10px, 3vw, 14px);
    }

    /* ── Reel columns ── */
    .reels {
      display: flex;
      gap: clamp(8px, 2.5vw, 12px);
      margin-bottom: clamp(6px, 2vw, 10px);
    }
    .reel-col {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: stretch; gap: 6px;
    }

    /* ── Reel wrapper ── */
    .reel-wrapper {
      aspect-ratio: 1;
      border-radius: 16px; overflow: hidden;
      border: 2px solid #e8e8e8;
      background: #fafafa; position: relative;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .reel-wrapper::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(160deg,
        rgba(255,255,255,0.4) 0%, transparent 45%,
        transparent 55%, rgba(255,255,255,0.15) 100%);
      pointer-events: none; z-index: 2;
    }

    /* リーチ: 最後のリールだけ光る (虹色スピンボーダー) */
    .reel-wrapper.reach-last {
      border-color: transparent !important;
      overflow: visible;
      animation: reachLastGlow 0.22s ease-in-out infinite alternate;
    }
    .reel-wrapper.reach-last::before {
      content: '';
      position: absolute;
      inset: -5px; border-radius: 20px;
      background: conic-gradient(#ff4e50, #ff8c42, #ffe066, #ff8c42, #ff4e50);
      animation: spinBorder 0.7s linear infinite;
      z-index: 0;
    }
    .reel-wrapper.reach-last::after {
      content: '';
      position: absolute;
      inset: 3px; border-radius: 14px;
      background: #fafafa;
      z-index: 1;
    }
    @keyframes spinBorder {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes reachLastGlow {
      from { box-shadow: 0 0 18px rgba(255,78,80,0.7), 0 0 35px rgba(255,140,66,0.3); }
      to   { box-shadow: 0 0 55px rgba(255,78,80,1),   0 0 100px rgba(255,140,66,0.65), 0 0 140px rgba(255,224,102,0.3); }
    }

    /* リーチ: ゆっくり回転アニメーション */
    .reel.reach-spin {
      animation: reachSlowSpin 0.55s ease-in-out infinite;
    }
    @keyframes reachSlowSpin {
      0%   { filter: blur(0px);  transform: scaleY(1);    }
      30%  { filter: blur(1.5px);transform: scaleY(0.96); }
      55%  { filter: blur(3px);  transform: scaleY(0.93); }
      80%  { filter: blur(1.5px);transform: scaleY(0.96); }
      100% { filter: blur(0px);  transform: scaleY(1);    }
    }

    /* Winner glow */
    .reel-wrapper.winner {
      border-color: #e8c84a !important;
      animation: winGlow 0.55s ease-in-out infinite alternate;
    }
    @keyframes winGlow {
      from { box-shadow: 0 0 8px rgba(232,200,74,0.3); }
      to   { box-shadow: 0 0 30px rgba(232,200,74,0.9), 0 0 55px rgba(232,200,74,0.35); }
    }

    /* ── Reel image ── */
    .reel {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    .reel img {
      width: 82%; height: 82%; object-fit: contain;
      border-radius: 8px; user-select: none; pointer-events: none; display: block;
    }

    /* Spin – slightly slower */
    .reel.spinning { animation: spinBlur 0.16s linear infinite; }
    @keyframes spinBlur {
      0%   { filter: blur(0px);  transform: scaleY(1);    }
      25%  { filter: blur(3px);  transform: scaleY(0.96); }
      50%  { filter: blur(7px);  transform: scaleY(0.90); }
      75%  { filter: blur(3px);  transform: scaleY(0.96); }
      100% { filter: blur(0px);  transform: scaleY(1);    }
    }

    /* Stop bounce */
    .reel.stopping {
      animation: stopBounce 0.4s cubic-bezier(.36,.07,.19,.97) forwards;
    }
    @keyframes stopBounce {
      0%   { transform: scaleY(0.90); filter: blur(4px); }
      55%  { transform: scaleY(1.08); filter: blur(0); }
      78%  { transform: scaleY(0.97); }
      100% { transform: scaleY(1); }
    }

    /* Reach: last reel slow pulse */
    .reel.reach-pulse {
      animation: reachPulse 0.45s ease-in-out infinite;
    }
    @keyframes reachPulse {
      0%   { transform: scaleY(1);    filter: blur(0px); }
      50%  { transform: scaleY(0.93); filter: blur(3px); }
      100% { transform: scaleY(1);    filter: blur(0px); }
    }

    /* ── STOP buttons ── */
    .stop-btn {
      width: 100%;
      height: clamp(34px, 10vw, 44px);
      border: none; border-radius: 10px;
      font-size: clamp(0.7rem, 3.2vw, 0.9rem);
      font-weight: 900; letter-spacing: 0.12em;
      cursor: pointer; touch-action: manipulation;
      transition: transform 0.1s, box-shadow 0.1s, opacity 0.15s, background 0.2s;
      -webkit-appearance: none; user-select: none;
      background: #ddd; color: #aaa;
      box-shadow: none;
    }
    .stop-btn.active {
      background: linear-gradient(135deg, #ff5f5f, #e83030);
      color: #fff;
      box-shadow: 0 3px 14px rgba(232,48,48,0.45), 0 2px 0 rgba(0,0,0,0.1);
      animation: stopBtnPulse 0.7s ease-in-out infinite alternate;
    }
    @keyframes stopBtnPulse {
      from { box-shadow: 0 3px 10px rgba(232,48,48,0.35); }
      to   { box-shadow: 0 3px 22px rgba(232,48,48,0.7),  0 0 30px rgba(232,48,48,0.3); }
    }
    .stop-btn.active:active {
      transform: scale(0.94) translateY(2px);
      box-shadow: 0 1px 6px rgba(232,48,48,0.3);
    }
    .stop-btn:disabled { opacity: 0.38; cursor: not-allowed; animation: none; }

    /* ── Hint ── */
    .reel-hint {
      text-align: center;
      font-size: clamp(0.65rem, 2.6vw, 0.76rem);
      color: #bbb; height: 1.6em;
      margin-bottom: clamp(6px, 2vw, 12px);
      transition: color 0.3s;
    }
    .reel-hint.active { color: #e8a020; font-weight: 600; }

    /* ── Credits / message / SPIN ── */
    .controls {
      display: flex; flex-direction: column;
      align-items: center; gap: clamp(6px, 2vw, 10px);
    }
    .credits-row {
      display: flex; gap: clamp(20px, 6vw, 32px);
      font-size: clamp(0.78rem, 3.2vw, 0.9rem); color: #888;
    }
    .credits-row span strong { color: #1a1a1a; font-size: clamp(1rem, 4.2vw, 1.2rem); }

    .message {
      min-height: 2.6em; font-size: clamp(0.78rem, 3.4vw, 1rem);
      font-weight: 700; text-align: center; line-height: 1.4; padding: 0 4px; color: #888;
    }
    .message.win     { color: #c88a00; }
    .message.lose    { color: #bbb; }
    .message.jackpot { color: #e83030; animation: jackpotFlash 0.35s linear infinite alternate; }
    @keyframes jackpotFlash {
      from { text-shadow: none; }
      to   { text-shadow: 0 0 18px rgba(232,48,48,0.8); }
    }

    .spin-btn {
      width: min(260px, 80vw);
      height: clamp(52px, 14vw, 62px);
      border: none; border-radius: 32px;
      background: linear-gradient(135deg, #f0d050, #e8a030);
      color: #fff; font-size: clamp(1rem, 4.5vw, 1.25rem);
      font-weight: 900; letter-spacing: 0.12em;
      cursor: pointer; touch-action: manipulation;
      box-shadow: 0 4px 18px rgba(232,160,48,0.45), 0 2px 0 rgba(0,0,0,0.08);
      transition: transform 0.1s, box-shadow 0.1s, opacity 0.2s;
      -webkit-appearance: none; user-select: none;
    }
    .spin-btn:active:not(:disabled) {
      transform: scale(0.95) translateY(2px);
      box-shadow: 0 2px 8px rgba(232,160,48,0.3);
    }
    .spin-btn:disabled { opacity: 0.38; cursor: not-allowed; }

    /* ── REACH overlay ── */
    #reach-overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      pointer-events: none; z-index: 60;
      opacity: 0; transition: opacity 0.25s;
    }
    #reach-overlay.show { opacity: 1; }

    #reach-bg {
      position: absolute; inset: 0;
      animation: bgPulse 0.5s ease-in-out infinite alternate;
    }
    @keyframes bgPulse {
      from { background: rgba(0,0,0,0.60); }
      to   { background: rgba(60,0,0,0.72); }
    }

    #reach-text {
      position: relative; z-index: 2;
      font-size: clamp(3.5rem, 18vw, 8rem);
      font-weight: 900; letter-spacing: 0.1em;
      transform: scale(0.3) rotate(-10deg);
      transition: transform 0.4s cubic-bezier(0.34, 1.7, 0.64, 1);
    }
    #reach-overlay.show #reach-text {
      transform: scale(1) rotate(-3deg);
      animation: reachBounce 0.55s ease-in-out infinite alternate,
                 reachColor  0.7s linear infinite;
    }
    @keyframes reachBounce {
      from { transform: scale(1)    rotate(-3deg); }
      to   { transform: scale(1.1)  rotate(2deg);  }
    }
    @keyframes reachColor {
      0%   { color:#fff;    text-shadow: 0 0 25px #ff4e50, 0 0 60px #ff4e50, 0 0 100px rgba(255,78,80,0.5); }
      25%  { color:#ffe066; text-shadow: 0 0 25px #e8c84a, 0 0 60px #e8c84a, 0 0 100px rgba(232,200,74,0.5); }
      50%  { color:#ff8c42; text-shadow: 0 0 25px #ff4e50, 0 0 60px #ff8c42, 0 0 100px rgba(255,140,66,0.5); }
      75%  { color:#ff4e50; text-shadow: 0 0 35px #ff4e50, 0 0 80px #ff4e50, 0 0 120px rgba(255,78,80,0.6); }
      100% { color:#fff;    text-shadow: 0 0 25px #ff4e50, 0 0 60px #ff4e50, 0 0 100px rgba(255,78,80,0.5); }
    }

    #reach-sub {
      position: relative; z-index: 2;
      font-size: clamp(1rem, 4.5vw, 1.6rem);
      font-weight: 900; letter-spacing: 0.22em; margin-top: 14px;
      opacity: 0; transform: translateY(16px) scale(0.8);
      transition: opacity 0.35s 0.3s, transform 0.35s 0.3s;
    }
    #reach-overlay.show #reach-sub {
      opacity: 1; transform: translateY(0) scale(1);
      animation: subPulse 0.5s ease-in-out infinite alternate;
    }
    @keyframes subPulse {
      from { color: #ffe066; text-shadow: 0 0 10px rgba(255,224,102,0.6); }
      to   { color: #fff;    text-shadow: 0 0 20px rgba(255,224,102,1), 0 0 40px rgba(255,140,66,0.5); }
    }

    /* Stars that float up during reach */
    .reach-star {
      position: fixed;
      font-size: clamp(1.2rem, 4vw, 2rem);
      pointer-events: none;
      z-index: 61;
      animation: starFloat 1.2s ease-out forwards;
    }
    @keyframes starFloat {
      0%   { opacity: 1; transform: translateY(0)   scale(1)   rotate(0deg); }
      100% { opacity: 0; transform: translateY(-160px) scale(1.6) rotate(180deg); }
    }

    /* Screen flash */
    #flash {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 59;
      opacity: 0;
    }
    #flash.flash-on {
      animation: screenFlash 0.14s ease-out forwards;
    }
    @keyframes screenFlash {
      0%   { opacity: 0.75; background: #ff8c42; }
      100% { opacity: 0; }
    }

    /* ── Win overlay ── */
    #win-overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      pointer-events: none; z-index: 70;
      opacity: 0; transition: opacity 0.3s;
    }
    #win-overlay.show { opacity: 1; }

    #win-bg {
      position: absolute; inset: 0;
      animation: winBgPulse 0.5s ease-in-out infinite alternate;
    }
    @keyframes winBgPulse {
      from { background: rgba(20,10,0,0.65); }
      to   { background: rgba(55,30,0,0.78); }
    }
    #win-overlay.jackpot #win-bg {
      animation: jpBgPulse 0.4s ease-in-out infinite alternate;
    }
    @keyframes jpBgPulse {
      from { background: rgba(0,0,30,0.72); }
      to   { background: rgba(35,0,50,0.82); }
    }

    #win-title {
      position: relative; z-index: 2;
      font-size: clamp(3rem, 17vw, 8rem);
      font-weight: 900; letter-spacing: 0.08em;
      transform: scale(0.15) rotate(-10deg);
      transition: transform 0.45s cubic-bezier(0.34, 1.8, 0.64, 1);
    }
    #win-overlay.show #win-title {
      transform: scale(1) rotate(-2deg);
      animation: winTitleBounce 0.5s ease-in-out infinite alternate,
                 winTitleColor  0.7s linear infinite;
    }
    @keyframes winTitleBounce {
      from { transform: scale(1)   rotate(-2deg); }
      to   { transform: scale(1.1) rotate(2deg);  }
    }
    @keyframes winTitleColor {
      0%   { color:#ffe066; text-shadow:0 0 28px #e8c84a,0 0 70px #e8c84a,0 0 110px rgba(232,200,74,0.4); }
      33%  { color:#fff;    text-shadow:0 0 30px #fff,   0 0 70px rgba(255,255,255,0.5); }
      66%  { color:#ff8c42; text-shadow:0 0 28px #ff8c42,0 0 70px rgba(255,140,66,0.5); }
      100% { color:#ffe066; text-shadow:0 0 28px #e8c84a,0 0 70px #e8c84a,0 0 110px rgba(232,200,74,0.4); }
    }
    #win-overlay.jackpot #win-title {
      animation: winTitleBounce 0.45s ease-in-out infinite alternate,
                 jpTitleColor   0.55s linear infinite !important;
    }
    @keyframes jpTitleColor {
      0%   { color:#ffe066; text-shadow:0 0 35px #e8c84a,0 0 80px #e8c84a; }
      20%  { color:#ff8c42; text-shadow:0 0 35px #ff8c42,0 0 80px #ff8c42; }
      40%  { color:#ff4e50; text-shadow:0 0 35px #ff4e50,0 0 80px #ff4e50; }
      60%  { color:#a8ff78; text-shadow:0 0 35px #a8ff78,0 0 80px rgba(168,255,120,0.7); }
      80%  { color:#43cfff; text-shadow:0 0 35px #43cfff,0 0 80px rgba(67,207,255,0.7); }
      100% { color:#ffe066; text-shadow:0 0 35px #e8c84a,0 0 80px #e8c84a; }
    }

    #win-product {
      position: relative; z-index: 2;
      font-size: clamp(0.85rem, 3.8vw, 1.35rem);
      color: #fff; font-weight: 700; letter-spacing: 0.08em;
      text-align: center; padding: 0 16px; margin-top: 10px;
      opacity: 0; transform: translateY(14px);
      transition: opacity 0.35s 0.28s, transform 0.35s 0.28s;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    #win-overlay.show #win-product { opacity: 1; transform: translateY(0); }

    #win-prize {
      position: relative; z-index: 2;
      font-size: clamp(1.6rem, 8vw, 3rem);
      font-weight: 900; letter-spacing: 0.06em;
      color: #ffe066;
      text-shadow: 0 0 20px rgba(255,224,102,0.8), 0 3px 0 rgba(0,0,0,0.4);
      margin-top: 14px;
      opacity: 0; transform: scale(0.3);
      transition: opacity 0.4s 0.42s, transform 0.4s 0.42s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #win-overlay.show #win-prize {
      opacity: 1; transform: scale(1);
      animation: prizePulse 0.55s ease-in-out infinite alternate;
    }
    @keyframes prizePulse {
      from { filter:brightness(1);   text-shadow:0 0 15px rgba(255,224,102,0.6); }
      to   { filter:brightness(1.45);text-shadow:0 0 40px rgba(255,224,102,1),0 0 80px rgba(255,140,66,0.4); }
    }

    /* Machine win glow */
    .machine.win-active {
      animation: winMachinePulse 0.45s ease-in-out infinite alternate;
    }
    @keyframes winMachinePulse {
      from { box-shadow:0 0 0 3px #e8c84a,0 0 20px rgba(232,200,74,0.3),0 16px 48px rgba(0,0,0,0.12); }
      to   { box-shadow:0 0 0 7px #e8c84a,0 0 70px rgba(232,200,74,0.8),0 16px 60px rgba(232,200,74,0.2); }
    }
    .machine.jackpot-active {
      animation: machineShake 0.13s ease-in-out infinite, rainbowBorder 0.38s linear infinite;
    }

    /* Falling coins */
    .coin {
      position: fixed; top: -50px;
      font-size: clamp(1.4rem, 5vw, 2.4rem);
      pointer-events: none; z-index: 101;
      animation: coinFall var(--dur, 1.5s) cubic-bezier(0.2,0,0.8,1) forwards;
    }
    @keyframes coinFall {
      0%   { opacity:1; transform:translateY(0)              rotate(0deg)   scale(1);   }
      80%  { opacity:1; }
      100% { opacity:0; transform:translateY(var(--dy,600px)) rotate(420deg) scale(0.75); }
    }

    /* Confetti */
    #confetti {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 100;
    }
  </style>
</head>
<body>

<canvas id="confetti"></canvas>

<div id="reach-overlay">
  <div id="reach-bg"></div>
  <div id="reach-text">REACH!!</div>
  <div id="reach-sub">揃うか！？</div>
</div>

<div id="win-overlay">
  <div id="win-bg"></div>
  <div id="win-title"></div>
  <div id="win-product"></div>
  <div id="win-prize"></div>
</div>

<div id="flash"></div>

<h1>錦　櫂 ふりかけスロット</h1>
<p class="subtitle">全リール揃ったら当たり！</p>

<div class="machine" id="machine">
  <div class="machine-header">🎰 NISIKI-KAI SLOT 🎰</div>

  <div class="reels">
    <div class="reel-col">
      <div class="reel-wrapper" id="w0">
        <div class="reel" id="r0"><img id="img0" src="" alt=""></div>
      </div>
      <button class="stop-btn" id="sb0" onclick="userStop(0)" disabled>STOP</button>
    </div>
    <div class="reel-col">
      <div class="reel-wrapper" id="w1">
        <div class="reel" id="r1"><img id="img1" src="" alt=""></div>
      </div>
      <button class="stop-btn" id="sb1" onclick="userStop(1)" disabled>STOP</button>
    </div>
    <div class="reel-col">
      <div class="reel-wrapper" id="w2">
        <div class="reel" id="r2"><img id="img2" src="" alt=""></div>
      </div>
      <button class="stop-btn" id="sb2" onclick="userStop(2)" disabled>STOP</button>
    </div>
  </div>

  <p class="reel-hint" id="hint">SPIN を押してスタート</p>

  <div class="controls">
    <div class="credits-row">
      <span>コイン: <strong id="credits">10</strong></span>
      <span>獲得: <strong id="won">0</strong></span>
    </div>
    <div class="message" id="message">スピンしてください！</div>
    <button class="spin-btn" id="spinBtn" onclick="spin()">SPIN ▶</button>
  </div>
</div>

<script>
const PRODUCTS = [
  { name: 'えび・ほたてふりかけ', img: 'https://makeshop-multi-images.akamaized.net/nisikikai/itemimages/0000000004733_VDwqeb4.jpg' },
  { name: 'しらすふりかけ',       img: 'https://makeshop-multi-images.akamaized.net/nisikikai/itemimages/0000000004853_8eUzcFV.jpg' },
  { name: '小魚せんべい',         img: 'https://makeshop-multi-images.akamaized.net/nisikikai/itemimages/0000000004773_cji1nw0.jpg' },
  { name: '梅しそふりかけ',       img: 'https://makeshop-multi-images.akamaized.net/nisikikai/itemimages/0000000001473_baRZatM.jpg' },
  { name: '海苔・小魚ふりかけ',   img: 'https://makeshop-multi-images.akamaized.net/nisikikai/itemimages/0000000004283_goJQiNk.jpg' },
  { name: '錦　櫂ギフトセット',   img: 'https://makeshop-multi-images.akamaized.net/nisikikai/itemimages/0000000004783_pkdF5lg.jpg' }
];

let credits = 10, won = 0;
let gameState   = 'idle';
let reelState   = ['idle','idle','idle'];
let stoppedOrder = [];
let spinIntervals = [null, null, null];
let currentIdx  = [0, 0, 0];
let finalIdx    = [0, 0, 0];

const rand = () => Math.floor(Math.random() * PRODUCTS.length);

function showImage(i, idx) {
  const img = document.getElementById('img' + i);
  img.src = PRODUCTS[idx].img;
  img.alt = PRODUCTS[idx].name;
}
function setMessage(text, cls = '') {
  const el = document.getElementById('message');
  el.textContent = text; el.className = 'message ' + cls;
}
function setHint(text, active = false) {
  const el = document.getElementById('hint');
  el.textContent = text;
  el.className = 'reel-hint' + (active ? ' active' : '');
}
function updateCredits() {
  document.getElementById('credits').textContent = credits;
  document.getElementById('won').textContent = won;
  document.getElementById('spinBtn').disabled = gameState !== 'idle' || credits <= 0;
}
function setStopBtn(i, active) {
  const btn = document.getElementById('sb' + i);
  btn.disabled = !active;
  btn.className = 'stop-btn' + (active ? ' active' : '');
}

// ── Screen flash ────────────────────────────────────────
let flashTimer = null;
function triggerFlash(color = '#ff8c42') {
  const el = document.getElementById('flash');
  el.style.background = color;
  el.classList.remove('flash-on');
  void el.offsetWidth;
  el.classList.add('flash-on');
}

// ── Floating stars ───────────────────────────────────────
const STARS = ['⭐','✨','🌟','💫','⚡'];
function spawnStar(x, y) {
  const el = document.createElement('div');
  el.className = 'reach-star';
  el.textContent = STARS[Math.floor(Math.random() * STARS.length)];
  el.style.left = (x + (Math.random() - 0.5) * 80) + 'px';
  el.style.top  = y + 'px';
  el.style.animationDuration = (0.9 + Math.random() * 0.6) + 's';
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}
function burstStars(reelIndices) {
  reelIndices.forEach(i => {
    const w = document.getElementById('w' + i);
    const rect = w.getBoundingClientRect();
    for (let k = 0; k < 5; k++) {
      setTimeout(() => spawnStar(
        rect.left + rect.width  * Math.random(),
        rect.top  + rect.height * Math.random()
      ), k * 120);
    }
  });
}

// ── REACH overlay ───────────────────────────────────────
function showReach() {
  document.getElementById('reach-overlay').classList.add('show');
}
function hideReach() {
  document.getElementById('reach-overlay').classList.remove('show');
}

// ── SPIN ────────────────────────────────────────────────
function spin() {
  if (gameState !== 'idle' || credits <= 0) return;
  gameState    = 'spinning';
  reelState    = ['spinning','spinning','spinning'];
  stoppedOrder = [];
  credits--;
  updateCredits();
  if (navigator.vibrate) navigator.vibrate(25);

  // 50% win rate
  if (Math.random() < 0.5) {
    const sym = rand();
    finalIdx = [sym, sym, sym];
  } else {
    for (let i = 0; i < 3; i++) finalIdx[i] = rand();
    if (finalIdx[0] === finalIdx[1] && finalIdx[1] === finalIdx[2]) {
      finalIdx[2] = (finalIdx[2] + 1 + Math.floor(Math.random() * (PRODUCTS.length - 1))) % PRODUCTS.length;
    }
  }

  for (let i = 0; i < 3; i++) {
    document.getElementById('w' + i).classList.remove('winner','reach-match');
    document.getElementById('r' + i).classList.remove('stopping','reach-pulse');
    document.getElementById('r' + i).classList.add('spinning');
    setStopBtn(i, true);
    let c = currentIdx[i];
    spinIntervals[i] = setInterval(() => {
      c = (c + 1) % PRODUCTS.length;
      showImage(i, c);
    }, 130);
  }

  setMessage('STOPボタンで止めてください！');
  setHint('▼ 下のボタンで停止 ▼', true);
}

// ── User taps STOP ──────────────────────────────────────
function userStop(i) {
  if (gameState !== 'spinning') return;
  if (reelState[i] !== 'spinning') return;

  const stillSpinning = reelState.filter(s => s === 'spinning').length;
  if (stillSpinning === 1 && stoppedOrder.length === 2) {
    const [s0, s1] = stoppedOrder;
    if (finalIdx[s0] === finalIdx[s1]) {
      triggerChanceGimmick(i);
      return;
    }
  }
  stopReelNormal(i);
}

// ── Normal stop ─────────────────────────────────────────
function stopReelNormal(i) {
  clearInterval(spinIntervals[i]);
  reelState[i] = 'stopped';
  stoppedOrder.push(i);
  showImage(i, finalIdx[i]);
  currentIdx[i] = finalIdx[i];
  if (navigator.vibrate) navigator.vibrate(35);

  setStopBtn(i, false);
  const r = document.getElementById('r' + i);
  r.classList.remove('spinning');
  r.classList.add('stopping');
  r.addEventListener('animationend', () => r.classList.remove('stopping'), { once: true });

  const remaining = reelState.filter(s => s === 'spinning').length;
  if (remaining === 0) {
    setTimeout(checkResult, 420);
  } else {
    updateHint();
  }
}

function updateHint() {
  const remaining = [0,1,2].filter(i => reelState[i] === 'spinning').length;
  if (remaining === 1 && stoppedOrder.length === 2 &&
      finalIdx[stoppedOrder[0]] === finalIdx[stoppedOrder[1]]) {
    setHint('2つ揃った！最後を止めて！', true);
    setMessage('あと1つ！チャンスかも…', '');
  } else if (remaining === 1) {
    setHint('あと1つ！', true);
  } else {
    setHint('▼ 下のボタンで停止 ▼', true);
  }
}

// ── REACH!! gimmick ─────────────────────────────────────
const REACH_DURATION = 7000; // 7秒

function triggerChanceGimmick(reelIdx) {
  gameState = 'gimmick';
  clearInterval(spinIntervals[reelIdx]);
  reelState[reelIdx] = 'stopped';
  stoppedOrder.push(reelIdx);

  for (let i = 0; i < 3; i++) setStopBtn(i, false);

  const w = document.getElementById('w' + reelIdx);
  const r = document.getElementById('r' + reelIdx);
  r.classList.remove('spinning');

  // 最後のリールだけ光る
  w.classList.add('reach-last');

  // ゆっくり回転開始（250ms間隔）
  let c = currentIdx[reelIdx];
  const slowInterval = setInterval(() => {
    c = (c + 1) % PRODUCTS.length;
    showImage(reelIdx, c);
  }, 250);
  r.classList.add('reach-spin');

  // マシンは控えめなグロー
  document.getElementById('machine').classList.add('reach-active');

  setHint('');
  setMessage('🔥🔥 REACH！！ 揃うか！？ 🔥🔥', 'jackpot');

  // REACH オーバーレイ
  setTimeout(() => showReach(), 150);

  // フラッシュ: 最初の盛り上がり部分のみ(0〜1.5秒)
  [[0,'#ff8c42'],[220,'#fff'],[440,'#ff4e50'],[700,'#ffe066'],[1000,'#fff'],[1400,'#ff8c42']]
    .forEach(([t,c]) => setTimeout(() => triggerFlash(c), t));

  // 最後のリールだけ星を定期的に飛ばす
  const starTimes = [400, 1200, 2200, 3400, 4600, 5800];
  starTimes.forEach(t => setTimeout(() => burstStars([reelIdx]), t));

  // バイブ
  if (navigator.vibrate) navigator.vibrate([80,40,80,40,120,60,80,40,80]);

  // ── 7秒後に解決 ─────────────────────────────────────
  setTimeout(() => {
    clearInterval(slowInterval);
    hideReach();
    document.getElementById('machine').classList.remove('reach-active');
    w.classList.remove('reach-last');
    r.classList.remove('reach-spin');

    showImage(reelIdx, finalIdx[reelIdx]);
    currentIdx[reelIdx] = finalIdx[reelIdx];

    triggerFlash('#ffffff');
    r.classList.add('stopping');
    r.addEventListener('animationend', () => r.classList.remove('stopping'), { once: true });

    setTimeout(() => {
      gameState = 'spinning';
      checkResult();
    }, 460);
  }, REACH_DURATION);
}

// ── Win sequence ─────────────────────────────────────────
function triggerWinSequence(isJackpot, prize, productName) {
  for (let i = 0; i < 3; i++) document.getElementById('w' + i).classList.add('winner');
  const machine = document.getElementById('machine');
  machine.classList.add(isJackpot ? 'jackpot-active' : 'win-active');

  // Overlay content
  const overlay = document.getElementById('win-overlay');
  document.getElementById('win-title').textContent   = isJackpot ? 'JACKPOT!!' : '当たり！！';
  document.getElementById('win-product').textContent = productName + ' × 3';
  document.getElementById('win-prize').textContent   = '+' + prize + 'コイン';
  if (isJackpot) overlay.classList.add('jackpot');

  // Flash sequence
  const flashColors = isJackpot
    ? ['#ffe066','#fff','#ff4e50','#ffe066','#43cfff','#fff','#ff8c42','#ffe066','#fff','#ff4e50','#a8ff78','#fff']
    : ['#ffe066','#fff','#e8c84a','#fff','#ffe066','#fff'];
  flashColors.forEach((c, i) => setTimeout(() => triggerFlash(c), i * (isJackpot ? 220 : 300)));

  // Show overlay
  setTimeout(() => overlay.classList.add('show'), 130);

  // Stars burst from all 3 reels
  const starTimes = isJackpot ? [200,500,900,1300,1800,2400,3100,3700] : [200,600,1200,1900];
  starTimes.forEach(t => setTimeout(() => burstStars([0,1,2]), t));

  // Coins fall
  spawnCoins(isJackpot ? 22 : 10);
  if (isJackpot) {
    setTimeout(() => spawnCoins(18), 900);
    setTimeout(() => spawnCoins(14), 2000);
  }

  // Confetti
  setTimeout(() => launchConfetti(isJackpot ? 280 : 110), 250);
  if (isJackpot) {
    setTimeout(() => launchConfetti(180), 1600);
    setTimeout(() => launchConfetti(120), 3000);
  }

  // Vibration
  if (navigator.vibrate) {
    if (isJackpot) {
      navigator.vibrate([100,40,100,40,160,50,100,40,100,40,300,80,200,80,200]);
      setTimeout(() => navigator.vibrate([100,40,100,40,200,80,300,80,300]), 1600);
    } else {
      navigator.vibrate([80,40,80,40,120,60,80,40,200]);
    }
  }

  // After overlay → show text message & reset machine style
  const duration = isJackpot ? 5000 : 3200;
  setTimeout(() => {
    overlay.classList.remove('show', 'jackpot');
    machine.classList.remove('win-active', 'jackpot-active');
    if (isJackpot) {
      setMessage('🎊 JACKPOT！ ギフトセット当選！ +30コイン', 'jackpot');
    } else {
      setMessage(`🎉 当たり！ ${productName} ×3！ +${prize}コイン`, 'win');
    }
  }, duration);
}

function spawnCoins(n) {
  for (let i = 0; i < n; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'coin';
      el.textContent = '🪙';
      el.style.left = (8 + Math.random() * 84) + 'vw';
      const dur = (1.2 + Math.random() * 1.3).toFixed(2) + 's';
      const dy  = Math.round(window.innerHeight * (0.55 + Math.random() * 0.45)) + 'px';
      el.style.setProperty('--dur', dur);
      el.style.setProperty('--dy',  dy);
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }, i * 90);
  }
}

// ── Check result ─────────────────────────────────────────
function checkResult() {
  const [a, b, c] = finalIdx;
  const isWin     = a === b && b === c;
  const isJackpot = isWin && a === 5;

  gameState = 'idle';
  reelState = ['idle','idle','idle'];
  setHint('SPIN を押してスタート');

  if (isWin) {
    const prize = isJackpot ? 30 : 10;
    credits += prize; won += prize;
    triggerWinSequence(isJackpot, prize, PRODUCTS[a].name);
  } else {
    setMessage('惜しい！もう一度チャレンジ！', 'lose');
    if (navigator.vibrate) navigator.vibrate(20);
  }

  updateCredits();

  if (credits <= 0) {
    setTimeout(() => {
      setMessage('コインがなくなりました。リセットします…', 'lose');
      setTimeout(() => {
        credits = 10; won = 0; updateCredits();
        setMessage('スピンしてください！', '');
      }, 2500);
    }, isWin ? 6000 : 1600);
  }
}

// ── Confetti ─────────────────────────────────────────────
const canvas = document.getElementById('confetti');
const ctx    = canvas.getContext('2d');
let particles = [];

function launchConfetti(n) {
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const colors = ['#e8c84a','#ff8c42','#ff4e50','#43cfff','#a8ff78','#ffffff'];
  for (let i = 0; i < n; i++) {
    particles.push({
      x: Math.random() * canvas.width, y: -10,
      vx: (Math.random() - 0.5) * 5,
      vy: Math.random() * 4 + 2,
      r:  Math.random() * 7 + 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * Math.PI * 2,
      spin: (Math.random() - 0.5) * 0.2
    });
  }
  requestAnimationFrame(drawConfetti);
}
function drawConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.y < canvas.height + 20);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.rot += p.spin;
    ctx.save();
    ctx.translate(p.x, p.y); ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.r/2, -p.r/2, p.r, p.r * 0.55);
    ctx.restore();
  }
  if (particles.length > 0) requestAnimationFrame(drawConfetti);
  else ctx.clearRect(0, 0, canvas.width, canvas.height);
}

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
});

// ── Init ─────────────────────────────────────────────────
for (let i = 0; i < 3; i++) { currentIdx[i] = rand(); showImage(i, currentIdx[i]); }
updateCredits();
</script>
</body>
</html>

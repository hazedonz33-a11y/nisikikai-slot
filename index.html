<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffffff">
  <title>錦　櫂 ふりかけスロット</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body { height: 100%; overscroll-behavior: none; }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: #f0ede8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      color: #1a1a1a;
      padding:
        calc(16px + env(safe-area-inset-top))
        calc(16px + env(safe-area-inset-right))
        calc(16px + env(safe-area-inset-bottom))
        calc(16px + env(safe-area-inset-left));
    }

    h1 {
      font-size: clamp(1.4rem, 6vw, 2.2rem);
      font-weight: 900;
      letter-spacing: 0.1em;
      text-align: center;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: clamp(0.72rem, 3vw, 0.85rem);
      color: #999;
      text-align: center;
      margin-bottom: clamp(14px, 4vw, 26px);
    }

    /* ── Machine ── */
    .machine {
      width: min(520px, calc(100vw - 32px));
      background: #ffffff;
      border-radius: 28px;
      padding: clamp(16px, 4vw, 28px) clamp(14px, 4vw, 24px) clamp(18px, 5vw, 28px);
      box-shadow:
        0 0 0 3px #e8c84a,
        0 0 0 6px #ffffff,
        0 16px 48px rgba(0,0,0,0.12);
    }

    .machine-header {
      text-align: center;
      font-size: clamp(0.62rem, 2.6vw, 0.76rem);
      letter-spacing: 0.18em;
      color: #c8a830;
      font-weight: 700;
      margin-bottom: clamp(10px, 3vw, 16px);
    }

    /* ── Reels ── */
    .reels {
      display: flex;
      gap: clamp(8px, 2.5vw, 12px);
      margin-bottom: 8px;
    }

    .reel-wrapper {
      flex: 1;
      aspect-ratio: 1;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid #e8e8e8;
      background: #fafafa;
      position: relative;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.1s;
    }

    /* Sheen overlay */
    .reel-wrapper::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, rgba(255,255,255,0.4) 0%, transparent 45%, transparent 55%, rgba(255,255,255,0.15) 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* Tappable state */
    .reel-wrapper.can-stop {
      cursor: pointer;
      border-color: #e8c84a;
      box-shadow: 0 0 0 3px rgba(232,200,74,0.25);
    }
    .reel-wrapper.can-stop:active { transform: scale(0.95); }

    /* STOP label */
    .stop-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3;
      pointer-events: none;
    }
    .stop-label span {
      font-size: clamp(0.7rem, 3vw, 0.9rem);
      font-weight: 900;
      letter-spacing: 0.1em;
      color: transparent;
      background: transparent;
      padding: 4px 10px;
      border-radius: 20px;
      transition: color 0.15s, background 0.15s;
    }
    .reel-wrapper.can-stop .stop-label span {
      color: #fff;
      background: rgba(0,0,0,0.28);
    }

    /* Reel image */
    .reel {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .reel img {
      width: 82%;
      height: 82%;
      object-fit: contain;
      border-radius: 8px;
      user-select: none;
      pointer-events: none;
      display: block;
    }

    /* Spin animation */
    .reel.spinning { animation: spinBlur 0.08s linear infinite; }
    @keyframes spinBlur {
      0%   { filter: blur(0px);  transform: scaleY(1);    }
      25%  { filter: blur(3px);  transform: scaleY(0.96); }
      50%  { filter: blur(6px);  transform: scaleY(0.91); }
      75%  { filter: blur(3px);  transform: scaleY(0.96); }
      100% { filter: blur(0px);  transform: scaleY(1);    }
    }

    /* Stop bounce */
    .reel.stopping {
      animation: stopBounce 0.38s cubic-bezier(.36,.07,.19,.97) forwards;
    }
    @keyframes stopBounce {
      0%   { transform: scaleY(0.91); filter: blur(3px); }
      55%  { transform: scaleY(1.07); filter: blur(0);   }
      78%  { transform: scaleY(0.97); }
      100% { transform: scaleY(1);    }
    }

    /* Chance gimmick – wrapper flash */
    .reel-wrapper.chance-glow {
      border-color: #ff8c42 !important;
      animation: chanceGlow 0.28s ease-in-out infinite alternate;
    }
    @keyframes chanceGlow {
      from { box-shadow: 0 0 6px rgba(255,140,66,0.3); }
      to   { box-shadow: 0 0 22px rgba(255,140,66,0.85), 0 0 40px rgba(232,200,74,0.4); }
    }

    /* Chance gimmick – reel slow pulse */
    .reel.chance-pulse {
      animation: chancePulse 0.5s ease-in-out infinite;
    }
    @keyframes chancePulse {
      0%   { transform: scaleY(1);    filter: blur(0px); }
      50%  { transform: scaleY(0.94); filter: blur(2px); }
      100% { transform: scaleY(1);    filter: blur(0px); }
    }

    /* Winner glow */
    .reel-wrapper.winner {
      border-color: #e8c84a !important;
      animation: winGlow 0.55s ease-in-out infinite alternate;
    }
    @keyframes winGlow {
      from { box-shadow: 0 0 8px rgba(232,200,74,0.3); }
      to   { box-shadow: 0 0 28px rgba(232,200,74,0.85), 0 0 48px rgba(232,200,74,0.35); }
    }

    /* ── Hint ── */
    .reel-hint {
      text-align: center;
      font-size: clamp(0.65rem, 2.6vw, 0.76rem);
      color: #bbb;
      height: 1.6em;
      margin-bottom: clamp(8px, 2.5vw, 14px);
      transition: color 0.3s;
    }
    .reel-hint.active { color: #e8a020; font-weight: 600; }

    /* ── Controls ── */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(8px, 2.5vw, 12px);
    }

    .credits-row {
      display: flex;
      gap: clamp(20px, 6vw, 32px);
      font-size: clamp(0.78rem, 3.2vw, 0.9rem);
      color: #888;
    }
    .credits-row span strong {
      color: #1a1a1a;
      font-size: clamp(1rem, 4.2vw, 1.2rem);
    }

    .message {
      min-height: 2.6em;
      font-size: clamp(0.78rem, 3.4vw, 1rem);
      font-weight: 700;
      text-align: center;
      line-height: 1.4;
      padding: 0 4px;
      color: #888;
    }
    .message.win     { color: #c88a00; }
    .message.lose    { color: #bbb; }
    .message.chance  { color: #e86020; animation: chanceMsgPulse 0.35s linear infinite alternate; }
    .message.jackpot { color: #e83030; animation: jackpotFlash  0.35s linear infinite alternate; }
    @keyframes chanceMsgPulse {
      from { opacity: 0.65; } to { opacity: 1; }
    }
    @keyframes jackpotFlash {
      from { text-shadow: none; }
      to   { text-shadow: 0 0 18px rgba(232,48,48,0.7); }
    }

    /* SPIN button */
    .spin-btn {
      width: min(260px, 80vw);
      height: clamp(52px, 14vw, 62px);
      border: none;
      border-radius: 32px;
      background: linear-gradient(135deg, #f0d050, #e8a030);
      color: #fff;
      font-size: clamp(1rem, 4.5vw, 1.25rem);
      font-weight: 900;
      letter-spacing: 0.12em;
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: 0 4px 18px rgba(232,160,48,0.45), 0 2px 0 rgba(0,0,0,0.08);
      transition: transform 0.1s, box-shadow 0.1s, opacity 0.2s;
      -webkit-appearance: none;
      user-select: none;
    }
    .spin-btn:active:not(:disabled) {
      transform: scale(0.95) translateY(2px);
      box-shadow: 0 2px 8px rgba(232,160,48,0.3);
    }
    .spin-btn:disabled { opacity: 0.38; cursor: not-allowed; }

    /* Confetti */
    #confetti {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>
<canvas id="confetti"></canvas>

<h1>錦　櫂 ふりかけスロット</h1>
<p class="subtitle">全リール揃ったら当たり！</p>

<div class="machine">
  <div class="machine-header">🎰 NISIKI-KAI SLOT 🎰</div>

  <div class="reels">
    <div class="reel-wrapper" id="w0" onclick="userStop(0)">
      <div class="stop-label"><span>STOP</span></div>
      <div class="reel" id="r0"><img id="img0" src="" alt=""></div>
    </div>
    <div class="reel-wrapper" id="w1" onclick="userStop(1)">
      <div class="stop-label"><span>STOP</span></div>
      <div class="reel" id="r1"><img id="img1" src="" alt=""></div>
    </div>
    <div class="reel-wrapper" id="w2" onclick="userStop(2)">
      <div class="stop-label"><span>STOP</span></div>
      <div class="reel" id="r2"><img id="img2" src="" alt=""></div>
    </div>
  </div>

  <p class="reel-hint" id="hint">SPIN を押してスタート</p>

  <div class="controls">
    <div class="credits-row">
      <span>コイン: <strong id="credits">10</strong></span>
      <span>獲得: <strong id="won">0</strong></span>
    </div>
    <div class="message" id="message">スピンしてください！</div>
    <button class="spin-btn" id="spinBtn" onclick="spin()">SPIN ▶</button>
  </div>
</div>

<script>
const PRODUCTS = [
  { name: 'えび・ほたてふりかけ', img: 'https://makeshop-multi-images.akamaized.net/nisikikai/itemimages/0000000004733_VDwqeb4.jpg' },
  { name: 'しらすふりかけ',       img: 'https://makeshop-multi-images.akamaized.net/nisikikai/itemimages/0000000004853_8eUzcFV.jpg' },
  { name: '小魚せんべい',         img: 'https://makeshop-multi-images.akamaized.net/nisikikai/itemimages/0000000004773_cji1nw0.jpg' },
  { name: '梅しそふりかけ',       img: 'https://makeshop-multi-images.akamaized.net/nisikikai/itemimages/0000000001473_baRZatM.jpg' },
  { name: '海苔・小魚ふりかけ',   img: 'https://makeshop-multi-images.akamaized.net/nisikikai/itemimages/0000000004283_goJQiNk.jpg' },
  { name: '錦　櫂ギフトセット',   img: 'https://makeshop-multi-images.akamaized.net/nisikikai/itemimages/0000000004783_pkdF5lg.jpg' }
];

// ── State ───────────────────────────────────────────────
let credits = 10, won = 0;
let gameState   = 'idle';                    // 'idle' | 'spinning' | 'gimmick'
let reelState   = ['idle','idle','idle'];    // 'idle' | 'spinning' | 'stopped'
let stoppedOrder = [];
let spinIntervals = [null, null, null];
let currentIdx  = [0, 0, 0];
let finalIdx    = [0, 0, 0];

// ── Helpers ─────────────────────────────────────────────
const rand = () => Math.floor(Math.random() * PRODUCTS.length);

function showImage(i, idx) {
  const img = document.getElementById('img' + i);
  img.src = PRODUCTS[idx].img;
  img.alt = PRODUCTS[idx].name;
}

function setMessage(text, cls = '') {
  const el = document.getElementById('message');
  el.textContent = text;
  el.className = 'message ' + cls;
}

function setHint(text, active = false) {
  const el = document.getElementById('hint');
  el.textContent = text;
  el.className = 'reel-hint' + (active ? ' active' : '');
}

function updateCredits() {
  document.getElementById('credits').textContent = credits;
  document.getElementById('won').textContent = won;
  document.getElementById('spinBtn').disabled = gameState !== 'idle' || credits <= 0;
}

// ── SPIN ────────────────────────────────────────────────
function spin() {
  if (gameState !== 'idle' || credits <= 0) return;

  gameState    = 'spinning';
  reelState    = ['spinning', 'spinning', 'spinning'];
  stoppedOrder = [];
  credits--;
  updateCredits();

  if (navigator.vibrate) navigator.vibrate(25);

  // 50% win rate: half the time force all 3 reels to match
  if (Math.random() < 0.5) {
    const sym = rand();
    finalIdx = [sym, sym, sym];
  } else {
    for (let i = 0; i < 3; i++) finalIdx[i] = rand();
    // Prevent accidental win in the lose path
    if (finalIdx[0] === finalIdx[1] && finalIdx[1] === finalIdx[2]) {
      finalIdx[2] = (finalIdx[2] + 1 + Math.floor(Math.random() * (PRODUCTS.length - 1))) % PRODUCTS.length;
    }
  }

  for (let i = 0; i < 3; i++) {
    const w = document.getElementById('w' + i);
    w.classList.remove('winner', 'chance-glow');
    w.classList.add('can-stop');
    const r = document.getElementById('r' + i);
    r.classList.remove('stopping', 'chance-pulse');
    r.classList.add('spinning');
    let c = currentIdx[i];
    spinIntervals[i] = setInterval(() => {
      c = (c + 1) % PRODUCTS.length;
      showImage(i, c);
    }, 80);
  }

  setMessage('リールをタップして止めてください！');
  setHint('タップ → STOP', true);
}

// ── User taps a reel ────────────────────────────────────
function userStop(i) {
  if (gameState !== 'spinning') return;
  if (reelState[i] !== 'spinning') return;

  const stillSpinning = reelState.filter(s => s === 'spinning').length;

  // Is this the LAST reel? → check for 2-match gimmick
  if (stillSpinning === 1 && stoppedOrder.length === 2) {
    const [s0, s1] = stoppedOrder;
    if (finalIdx[s0] === finalIdx[s1]) {
      triggerChanceGimmick(i);
      return;
    }
  }

  stopReelNormal(i);
}

// ── Normal stop ─────────────────────────────────────────
function stopReelNormal(i) {
  clearInterval(spinIntervals[i]);
  reelState[i]  = 'stopped';
  stoppedOrder.push(i);

  showImage(i, finalIdx[i]);
  currentIdx[i] = finalIdx[i];

  if (navigator.vibrate) navigator.vibrate(35);

  const w = document.getElementById('w' + i);
  w.classList.remove('can-stop');

  const r = document.getElementById('r' + i);
  r.classList.remove('spinning');
  r.classList.add('stopping');
  r.addEventListener('animationend', () => r.classList.remove('stopping'), { once: true });

  const remaining = reelState.filter(s => s === 'spinning').length;

  if (remaining === 0) {
    setTimeout(checkResult, 420);
  } else {
    updateHint();
  }
}

function updateHint() {
  const remaining = [0,1,2].filter(i => reelState[i] === 'spinning').length;
  if (remaining === 1) {
    // Do 2 stopped reels match?
    if (stoppedOrder.length === 2 && finalIdx[stoppedOrder[0]] === finalIdx[stoppedOrder[1]]) {
      setHint('2つ揃った！最後を止めて！', true);
      setMessage('あと1つ！チャンスがあるかも…', '');
    } else {
      setHint('あと1つ！', true);
    }
  } else {
    setHint('タップ → STOP', true);
  }
}

// ── Chance gimmick ──────────────────────────────────────
function triggerChanceGimmick(i) {
  gameState = 'gimmick';

  clearInterval(spinIntervals[i]);
  reelState[i] = 'stopped';
  stoppedOrder.push(i);

  const matchIdx = finalIdx[stoppedOrder[0]]; // image from the 2 matching reels
  const w = document.getElementById('w' + i);
  const r = document.getElementById('r' + i);

  // Remove can-stop immediately so no double-tap
  w.classList.remove('can-stop');
  r.classList.remove('spinning');

  // ① Show the MATCHING image (tease!)
  showImage(i, matchIdx);
  setMessage('🔥 チャンス！！ 揃うか！？', 'chance');
  setHint('');
  w.classList.add('chance-glow');
  r.classList.add('chance-pulse');
  if (navigator.vibrate) navigator.vibrate([70, 35, 70, 35, 120]);

  // ② After 1.4s → snap to actual final image
  setTimeout(() => {
    w.classList.remove('chance-glow');
    r.classList.remove('chance-pulse');

    showImage(i, finalIdx[i]);
    currentIdx[i] = finalIdx[i];

    r.classList.add('stopping');
    r.addEventListener('animationend', () => r.classList.remove('stopping'), { once: true });

    setTimeout(() => {
      gameState = 'spinning'; // hand off to checkResult
      checkResult();
    }, 420);
  }, 1400);
}

// ── Check result ─────────────────────────────────────────
function checkResult() {
  const [a, b, c] = finalIdx;
  const isWin     = a === b && b === c;
  const isJackpot = isWin && a === 5;

  gameState = 'idle';
  reelState = ['idle', 'idle', 'idle'];
  setHint('SPIN を押してスタート');
  updateCredits();

  if (isWin) {
    const prize = isJackpot ? 30 : 10;
    credits += prize;
    won     += prize;
    for (let i = 0; i < 3; i++) document.getElementById('w' + i).classList.add('winner');

    if (isJackpot) {
      setMessage('🎊 JACKPOT！ ギフトセット当選！ +30コイン', 'jackpot');
      if (navigator.vibrate) navigator.vibrate([100,50,100,50,200]);
      launchConfetti(160);
    } else {
      setMessage(`🎉 当たり！ ${PRODUCTS[a].name} ×3！ +${prize}コイン`, 'win');
      if (navigator.vibrate) navigator.vibrate([60,30,60]);
      launchConfetti(70);
    }
  } else {
    setMessage('惜しい！もう一度チャレンジ！', 'lose');
    if (navigator.vibrate) navigator.vibrate(20);
  }

  updateCredits();

  if (credits <= 0) {
    setTimeout(() => {
      setMessage('コインがなくなりました。リセットします…', 'lose');
      setTimeout(() => {
        credits = 10; won = 0; updateCredits();
        setMessage('スピンしてください！', '');
      }, 2500);
    }, 1600);
  }
}

// ── Confetti ─────────────────────────────────────────────
const canvas = document.getElementById('confetti');
const ctx    = canvas.getContext('2d');
let particles = [];

function launchConfetti(n) {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const colors  = ['#e8c84a','#ff8c42','#ff4e50','#43cfff','#a8ff78','#ffffff'];
  for (let i = 0; i < n; i++) {
    particles.push({
      x: Math.random() * canvas.width, y: -10,
      vx: (Math.random() - 0.5) * 5,
      vy: Math.random() * 4 + 2,
      r:  Math.random() * 7 + 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * Math.PI * 2,
      spin: (Math.random() - 0.5) * 0.2
    });
  }
  requestAnimationFrame(drawConfetti);
}

function drawConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.y < canvas.height + 20);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.rot += p.spin;
    ctx.save();
    ctx.translate(p.x, p.y); ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.r/2, -p.r/2, p.r, p.r * 0.55);
    ctx.restore();
  }
  if (particles.length > 0) requestAnimationFrame(drawConfetti);
  else ctx.clearRect(0, 0, canvas.width, canvas.height);
}

window.addEventListener('resize', () => {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
});

// ── Init ─────────────────────────────────────────────────
for (let i = 0; i < 3; i++) { currentIdx[i] = rand(); showImage(i, currentIdx[i]); }
updateCredits();
</script>
</body>
</html>
